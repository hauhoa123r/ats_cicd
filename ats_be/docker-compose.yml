name: ats_be

# All services join Compose's default network automatically and can reach
# each other by service name (eg "eureka-server", "job-db"). No custom
# network block is needed for a single-file local setup.

services:
  ats-db:
    image: postgres:16-alpine
    ports:
      - "5440:5432"          # dev only: open to host so DBeaver can connect; do NOT do this in production
    environment:
      POSTGRES_DB: ats_job_dbs
      POSTGRES_USER: dieunt
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ats-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dieunt -d ats_job_dbs"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== REDIS (used by api-gateway RequestRateLimiter) =====
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  ats-be-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://ats-db:5432/ats_job_dbs
    depends_on:
      ats-db:
        condition: service_healthy

volumes:
  ats-db-data: