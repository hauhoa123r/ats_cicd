spring.application.name=ats_be

#Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/ats_db_v2026
spring.datasource.username=dieunt
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

locations=Hà Nội, Hồ Chí Minh, Cần Thơ, Đà Nẵng, Quy Nhơn

expiration-time=${EXPIRATION_TIME}
# Refresh token lifetime in milliseconds (defaults to 7 days when REFRESH_EXPIRATION_TIME is not set)
refresh-expiration-time=${REFRESH_EXPIRATION_TIME:604800000}
secret-key=${SECRET_KEY}